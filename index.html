<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://api.entuned.co; img-src 'self' data: https:; media-src 'self' https:;" />
  <title>Ronson Admin — Entune</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    // GitHub Pages SPA redirect handler
    (function () {
      var params = new URLSearchParams(window.location.search);
      var p = params.get('p');
      if (p) {
        params.delete('p');
        var remaining = params.toString();
        window.history.replaceState(null, '', p + (remaining ? '?' + remaining : ''));
      }
    })();
  </script>
</head>
<body style="background:#0a0a0f;color:rgba(255,255,255,0.87);font-family:'Inter',sans-serif;">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
